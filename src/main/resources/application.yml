spring:
  application:
    name: takaful-web
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  thymeleaf:
    cache: false
  jpa:
    open-in-view: false

server:
  port: ${PORT:8080}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

toyyibpay:
  mode: ${TOYYIBPAY_MODE:mock}
  secret-key: ${TOYYIBPAY_SECRET_KEY:}
  category-code: ${TOYYIBPAY_CATEGORY_CODE:}
  base-url: ${TOYYIBPAY_BASE_URL:https://dev.toyyibpay.com}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}
  connect-timeout-ms: 3000
  read-timeout-ms: 20000

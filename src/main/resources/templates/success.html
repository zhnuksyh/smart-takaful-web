<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Request Submitted - Muqmeen Group</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-10 rounded-2xl shadow-lg text-center max-w-md w-full border border-slate-200">
        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fa-solid fa-check text-4xl text-green-500"></i>
        </div>
        <h3 class="text-2xl font-bold text-slate-800 mb-2">Request Submitted!</h3>
        <p class="text-slate-600 mb-6">Thank you. Your details have been saved and your assigned Takaful consultant will contact you shortly.</p>

        <div class="bg-slate-50 p-4 rounded-lg mb-6 text-left border border-slate-200 space-y-2">
            <p th:if="${lead != null}" class="text-xs text-slate-500 flex justify-between">
                <span>Reference</span>
                <span class="font-mono font-semibold text-slate-700" th:text="'#' + ${lead.id}">#42</span>
            </p>
            <p th:if="${lead != null}" class="text-xs text-slate-500 flex justify-between">
                <span>Product</span>
                <span class="font-medium text-slate-700" th:text="${lead.productType}">Product</span>
            </p>
            <p th:if="${lead != null}" class="text-xs text-slate-500 flex justify-between">
                <span>Contact via</span>
                <span class="font-medium text-slate-700" th:text="${lead.consultationMode}">WhatsApp</span>
            </p>
            <p th:if="${lead != null and lead.paymentStatus == 'PAID'}"
               class="text-xs text-slate-500 flex justify-between">
                <span>Tip</span>
                <span class="font-semibold text-green-600">
                    RM <span th:text="${#numbers.formatDecimal(lead.tipAmount, 1, 2)}">0.00</span> received
                </span>
            </p>
            <p th:if="${lead != null and lead.paymentStatus == 'SKIPPED'}"
               class="text-xs text-slate-400 flex justify-between">
                <span>Status</span>
                <span class="font-medium text-green-600">Confirmed</span>
            </p>
            <p th:if="${lead == null}" class="text-sm text-slate-500">
                Status: <span class="font-medium text-green-600">Confirmed</span>
            </p>
        </div>

        <div class="space-y-3">
            <a href="/account" class="inline-block w-full bg-yellow-400 hover:bg-yellow-300 text-zinc-950 font-semibold py-3 rounded-lg transition">View My Account</a>
            <a href="/" class="inline-block w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 rounded-lg transition">Return to Home</a>
        </div>
    </div>
</body>
</html>

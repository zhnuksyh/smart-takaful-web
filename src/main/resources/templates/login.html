<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Muqmeen Group</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-50 min-h-screen flex items-center justify-center p-4">
    <main class="w-full max-w-md">
        <a href="/" class="flex items-center justify-center mb-8">
            <i class="fa-solid fa-shield-halved text-yellow-500 text-2xl mr-2"></i>
            <span class="font-semibold text-xl tracking-tight">Muqmeen<span class="text-yellow-500">Group</span></span>
        </a>

        <section class="brand-shell rounded-xl p-8">
            <h1 class="text-2xl font-semibold text-zinc-950" th:text="${adminLogin} ? 'Admin sign in' : 'Welcome back'">Welcome back</h1>
            <p class="text-sm text-zinc-500 mt-1"
               th:text="${adminLogin} ? 'Sign in with the configured admin credentials.' : 'Sign in to continue your Takaful consultation.'">
                Sign in to continue your Takaful consultation.
            </p>

            <div th:if="${param.error}" class="mt-5 rounded-lg border border-amber-200 bg-yellow-50 p-3 text-sm text-yellow-800">
                Invalid email or password.
            </div>
            <div th:if="${param.logout}" class="mt-5 rounded-lg border border-green-200 bg-green-50 p-3 text-sm text-green-700">
                You have been signed out.
            </div>

            <form th:action="@{/login}" method="post" class="mt-6 space-y-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="redirect" th:value="${redirect}">

                <div>
                    <label for="username" class="block text-sm font-semibold text-zinc-700 mb-1">Email or admin username</label>
                    <input id="username" name="username" type="text" autocomplete="username" required autofocus
                           class="w-full rounded-lg border border-zinc-300 px-4 py-2 focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 outline-none">
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-zinc-700 mb-1">Password</label>
                    <input id="password" name="password" type="password" required
                           class="w-full rounded-lg border border-zinc-300 px-4 py-2 focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 outline-none">
                </div>

                <button type="submit"
                        class="w-full rounded-lg bg-yellow-400 hover:bg-yellow-300 text-zinc-950 font-semibold py-3 smooth-transition">
                    Sign in
                </button>
            </form>

            <p th:unless="${adminLogin}" class="text-sm text-zinc-500 mt-6 text-center">
                New here?
                <a th:href="@{/register(redirect=${redirect})}" class="font-semibold text-zinc-950 hover:text-yellow-600">Create an account</a>
            </p>
        </section>
    </main>
</body>
</html>

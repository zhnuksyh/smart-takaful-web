<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Muqmeen Group</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-50 min-h-screen flex items-center justify-center p-4">
    <main class="w-full max-w-lg">
        <a href="/" class="flex items-center justify-center mb-8">
            <i class="fa-solid fa-shield-halved text-yellow-500 text-2xl mr-2"></i>
            <span class="font-bold text-xl tracking-tight">Muqmeen<span class="text-yellow-500">Group</span></span>
        </a>

        <section class="brand-shell rounded-xl p-8">
            <h1 class="text-2xl font-bold text-zinc-950">Create your account</h1>
            <p class="text-sm text-zinc-500 mt-1">Track your consultations and payment history in one place.</p>

            <form th:action="@{/register}" th:object="${registerForm}" method="post" class="mt-6 space-y-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="redirect" th:value="${redirect}">

                <div>
                    <label class="block text-sm font-semibold text-zinc-700 mb-1">Full Name</label>
                    <input type="text" th:field="*{fullName}" required
                           th:classappend="${#fields.hasErrors('fullName')} ? 'border-amber-400' : 'border-zinc-300'"
                           class="w-full rounded-lg border px-4 py-2 focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 outline-none">
                    <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-xs text-yellow-700 mt-1">Name error</p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-zinc-700 mb-1">Email</label>
                    <input type="email" th:field="*{email}" required
                           th:classappend="${#fields.hasErrors('email')} ? 'border-amber-400' : 'border-zinc-300'"
                           class="w-full rounded-lg border px-4 py-2 focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 outline-none">
                    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-xs text-yellow-700 mt-1">Email error</p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-zinc-700 mb-1">WhatsApp Number</label>
                    <input type="tel" th:field="*{phoneNumber}" required placeholder="60123456789"
                           th:classappend="${#fields.hasErrors('phoneNumber')} ? 'border-amber-400' : 'border-zinc-300'"
                           class="w-full rounded-lg border px-4 py-2 focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 outline-none">
                    <p th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" class="text-xs text-yellow-700 mt-1">Phone error</p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-zinc-700 mb-1">Password</label>
                    <input type="password" th:field="*{password}" required minlength="8"
                           th:classappend="${#fields.hasErrors('password')} ? 'border-amber-400' : 'border-zinc-300'"
                           class="w-full rounded-lg border px-4 py-2 focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 outline-none">
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-xs text-yellow-700 mt-1">Password error</p>
                </div>

                <button type="submit"
                        class="w-full rounded-lg bg-yellow-400 hover:bg-yellow-300 text-zinc-950 font-bold py-3 smooth-transition">
                    Create account
                </button>
            </form>

            <p class="text-sm text-zinc-500 mt-6 text-center">
                Already registered?
                <a th:href="@{/login(redirect=${redirect})}" class="font-semibold text-zinc-950 hover:text-yellow-600">Sign in</a>
            </p>
        </section>
    </main>
</body>
</html>

services:
  app:
    build:
      context: .
    image: muqmeen-takaful-web:local
    ports:
      - "${PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      PORT: 8080
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      TOYYIBPAY_MODE: ${TOYYIBPAY_MODE:-mock}
      TOYYIBPAY_SECRET_KEY: ${TOYYIBPAY_SECRET_KEY:-}
      TOYYIBPAY_CATEGORY_CODE: ${TOYYIBPAY_CATEGORY_CODE:-}
      TOYYIBPAY_BASE_URL: ${TOYYIBPAY_BASE_URL:-https://dev.toyyibpay.com}
      CONTACT_RECIPIENT: ${CONTACT_RECIPIENT:-s72370@ocean.umt.edu.my}
      CONTACT_FORMSUBMIT_ENABLED: ${CONTACT_FORMSUBMIT_ENABLED:-true}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
